<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Video Script Factory - Generator</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui, sans-serif; background: #0a0a0a; color: #f0f0f0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
.card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 16px; padding: 40px; width: 100%; max-width: 600px; }
h1 { color: #e94560; font-size: 1.6rem; margin-bottom: 6px; }
.sub { color: #666; font-size: 0.85rem; margin-bottom: 32px; }
.field { margin-bottom: 20px; }
label { display: block; font-size: 0.8rem; color: #888; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
input, select, textarea { width: 100%; background: #111; border: 1px solid #333; border-radius: 8px; color: #f0f0f0; padding: 12px 14px; font-size: 0.95rem; font-family: inherit; outline: none; transition: border 0.2s; }
input:focus, select:focus, textarea:focus { border-color: #e94560; }
textarea { resize: vertical; min-height: 80px; }
select option { background: #1a1a1a; }
.btn { width: 100%; background: #e94560; color: white; border: none; border-radius: 8px; padding: 14px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 8px; }
.btn:hover { background: #c62a47; }
.btn:disabled { background: #444; cursor: not-allowed; }
.status { margin-top: 20px; padding: 14px; border-radius: 8px; font-size: 0.9rem; display: none; }
.status.loading { background: #16213e; border: 1px solid #378ADD; color: #a0c4ff; display: block; }
.status.success { background: #0f2a1a; border: 1px solid #3B6D11; color: #97C459; display: block; }
.status.error { background: #2a0f0f; border: 1px solid #A32D2D; color: #F09595; display: block; }
.result-link { display: block; margin-top: 12px; color: #e94560; font-weight: bold; word-break: break-all; }
.formats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
.format-btn { background: #111; border: 1px solid #333; border-radius: 8px; padding: 10px; text-align: center; cursor: pointer; font-size: 0.8rem; color: #888; }
.format-btn.active { border-color: #e94560; color: #e94560; background: #1a0a0f; }
.format-icon { font-size: 1.2rem; display: block; margin-bottom: 4px; }
</style>
</head>
<body>
<div class="card">
  <h1>Video Script Factory</h1>
  <p class="sub">AI-powered video production by Daffa Novendra Aditama</p>

  <div class="field">
    <label>Video Topic</label>
    <textarea id="topic" placeholder="Example: The Future of AI Agents in 2026">The Future of AI Agents in 2026</textarea>
  </div>

  <div class="field">
    <label>Select Format</label>
    <div class="formats">
      <div class="format-btn active" onclick="selectFormat('youtube_short', this)">
        <span class="format-icon">&#9654;</span>
        YouTube Short
      </div>
      <div class="format-btn" onclick="selectFormat('tiktok', this)">
        <span class="format-icon">&#9670;</span>
        TikTok
      </div>
      <div class="format-btn" onclick="selectFormat('instagram_reel', this)">
        <span class="format-icon">&#9711;</span>
        Instagram Reel
      </div>
      <div class="format-btn" onclick="selectFormat('linkedin_video', this)">
        <span class="format-icon">&#9635;</span>
        LinkedIn Video
      </div>
      <div class="format-btn" onclick="selectFormat('youtube_long', this)" style="grid-column:span 2">
        <span class="format-icon">&#9654;&#9654;</span>
        YouTube Long Form (8-10 min)
      </div>
    </div>
  </div>

  <div class="field">
    <label>Target Audience</label>
    <input type="text" id="audience" value="tech-savvy professionals">
  </div>

  <div class="field">
    <label>Tone</label>
    <select id="tone">
      <option value="educational_entertaining">Educational + Entertaining</option>
      <option value="professional">Professional</option>
      <option value="casual_fun">Casual + Fun</option>
      <option value="inspirational">Inspirational</option>
      <option value="news_style">News Style</option>
    </select>
  </div>

  <button class="btn" id="generateBtn" onclick="generate()">
    Generate Video Script Package
  </button>

  <div class="status" id="status"></div>
</div>

<script>
var selectedFormat = 'youtube_short';
var WEBHOOK_URL = 'https://eo827o195sps4vf.m.pipedream.net';

function selectFormat(format, el) {
  selectedFormat = format;
  var btns = document.querySelectorAll('.format-btn');
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.remove('active');
  }
  el.classList.add('active');
}

function showStatus(type, message) {
  var el = document.getElementById('status');
  el.className = 'status ' + type;
  el.innerHTML = message;
}

function generate() {
  var topic = document.getElementById('topic').value.trim();
  var audience = document.getElementById('audience').value.trim();
  var tone = document.getElementById('tone').value;
  var btn = document.getElementById('generateBtn');

  if (!topic) {
    showStatus('error', 'Please enter a video topic first.');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Generating... please wait 30-60 seconds';
  showStatus('loading', 'Generating your video script package... This takes about 30-60 seconds.');

  var url = WEBHOOK_URL + '?topic=' + encodeURIComponent(topic) + '&format=' + encodeURIComponent(selectedFormat) + '&audience=' + encodeURIComponent(audience) + '&tone=' + encodeURIComponent(tone);

  fetch(url)
    .then(function(res) { return res.json(); })
    .then(function(data) {
      btn.disabled = false;
      btn.textContent = 'Generate Video Script Package';
      if (data && data.url) {
        showStatus('success', 'Done! Your production package is ready. ' + '<a class="result-link" href="' + data.url + '" target="_blank">Open Production Package</a>');
      } else {
        showStatus('success', 'Pipeline triggered! Check your Telegram for the result notification.');
      }
    })
    .catch(function(err) {
      btn.disabled = false;
      btn.textContent = 'Generate Video Script Package';
      showStatus('success', 'Pipeline triggered successfully! Check Telegram for your video script package.');
    });
}
</script>
</body>
</html>
